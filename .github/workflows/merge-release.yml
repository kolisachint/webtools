name: Release on PR Merge

on:
  pull_request:
    types: [closed]

jobs:
  release:
    if: >
      github.event.pull_request.merged == true && (
        contains(github.event.pull_request.labels.*.name, 'cargo:patch') ||
        contains(github.event.pull_request.labels.*.name, 'cargo:minor') ||
        contains(github.event.pull_request.labels.*.name, 'cargo:major')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"

      - name: Determine release type from label
        id: release-type
        run: |
          if ${{ contains(github.event.pull_request.labels.*.name, 'cargo:major') }}; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif ${{ contains(github.event.pull_request.labels.*.name, 'cargo:minor') }}; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version in Cargo.toml
        id: bump
        run: |
          # Read current version
          CURRENT_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "Current version: $CURRENT_VERSION"

          # Parse semver
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Bump based on type
          BUMP_TYPE="${{ steps.release-type.outputs.type }}"
          case "$BUMP_TYPE" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "New version: $NEW_VERSION"

          # Bump the package version (the `version = "..."` line) in the
          # workspace root and every crate manifest.
          for manifest in Cargo.toml crates/*/Cargo.toml; do
            [ -f "$manifest" ] || continue
            sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" "$manifest"
          done

          # Keep the internal path+version dependency requirements in lockstep
          # (e.g. webfetch-core = { path = "...", version = "X" }).
          sed -i "s/\(path = \"[^\"]*\", version = \"\)[^\"]*\"/\1$NEW_VERSION\"/" Cargo.toml

          # Update Cargo.lock
          cargo update --workspace

          # Store for later steps
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          git add Cargo.toml Cargo.lock crates/*/Cargo.toml
          git commit -m "release: v${VERSION}"
          # Annotated tag so `git push --follow-tags` actually pushes it
          # (lightweight tags are skipped by --follow-tags).
          git tag -a "v${VERSION}" -m "release: v${VERSION}"

      - name: Push version bump and tag
        run: git push --follow-tags origin main
